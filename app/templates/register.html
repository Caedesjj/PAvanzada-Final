{% extends "index.html" %}

{% block title %}Registrarse - TaskFlow{% endblock %}

{% block content %}
<div class="row justify-content-center min-vh-100 align-items-center">
    <div class="col-md-5">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h1 class="display-6" style="font-size: 2.5rem;">
                        <i class="fas fa-user-plus" style="color: #00ff88;"></i>
                    </h1>
                    <h2 class="card-title">REGISTRARSE</h2>
                    <p class="text-muted" style="font-size: 0.85rem; letter-spacing: 1px;">ÚNETE A TASKFLOW</p>
                </div>
                
                <form method="POST" action="/register">
                    <div class="mb-3">
                        <label for="name" class="form-label">
                            <i class="fas fa-address-card"></i> Nombre Completo
                        </label>
                        <input type="text" class="form-control" id="name" name="name" required placeholder="Tu nombre">
                    </div>
                    
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user"></i> Usuario
                        </label>
                        <input type="text" class="form-control" id="username" name="username" required placeholder="Tu usuario">
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="tu@email.com">
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="fas fa-key"></i> Contraseña
                        </label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="Tu contraseña">
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100 mb-3">
                        <i class="fas fa-check"></i> REGISTRARSE
                    </button>
                </form>
                
                <hr style="border-color: rgba(0, 212, 255, 0.2);">
                
                <p class="text-center" style="color: #a0a0a0;">
                    ¿Ya tienes cuenta? 
                    <a href="/login" style="color: var(--primary);">
                        <strong>Inicia sesión aquí</strong>
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
